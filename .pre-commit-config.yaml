repos:
  - repo: local
    hooks:
      - id: cks-validate
        name: CKS Validate
        description: Validate CKS JSON files before commit.
        entry: python scripts/validate_cks.py
        language: system
        files: 'examples/corpus/valid_.*\.json$|examples/json/valid_.*\.json$'
        stages: [pre-commit]