[mypy]
python_version = 3.12
ignore_missing_imports = True
exclude = tests/|src/cks/cli/|src/cks/adapters/|src/cks/plugin\.py|src/cks/engine\.py|src/cks/interface\.py

[mypy-cks.core.*]
strict = True

[mypy-cks.constraints.*]
strict = True

[mypy-cks.diagnostics.*]
strict = True

[mypy-cks.result.*]
strict = True

[mypy-cks.serialization.*]
strict = True

[mypy-cks.validator.*]
strict = True